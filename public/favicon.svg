<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFC125"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Motorcycle wheel (rear) -->
  <circle cx="22" cy="46" r="10" fill="none" stroke="url(#bolt)" stroke-width="2.5"/>
  <circle cx="22" cy="46" r="3" fill="url(#bolt)"/>
  <!-- Motorcycle wheel (front) -->
  <circle cx="50" cy="46" r="10" fill="none" stroke="url(#bolt)" stroke-width="2.5"/>
  <circle cx="50" cy="46" r="3" fill="url(#bolt)"/>
  <!-- Motorcycle body / frame -->
  <path d="M22 46 L30 30 L36 22 L48 22 L48 32 L36 32 L32 38 L32 46" fill="none" stroke="url(#bolt)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Seat -->
  <path d="M28 30 L34 30" fill="none" stroke="url(#bolt)" stroke-width="4" stroke-linecap="round"/>
  <!-- Handlebars -->
  <path d="M44 22 L46 17 L50 17" fill="none" stroke="url(#bolt)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lightning bolt overlay -->
  <polygon points="38,12 28,30 35,30 30,46 44,26 37,26 42,12" fill="#FFD700" opacity="0.3"/>
</svg>
