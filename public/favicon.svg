<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Motorcycle group rotated 45° for dynamic look -->
  <g transform="rotate(25, 32, 36)" stroke="url(#gold)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rear wheel -->
    <circle cx="18" cy="44" r="9" stroke-width="2.5"/>
    <circle cx="18" cy="44" r="2.5" fill="url(#gold)"/>
    <!-- Front wheel -->
    <circle cx="50" cy="44" r="9" stroke-width="2.5"/>
    <circle cx="50" cy="44" r="2.5" fill="url(#gold)"/>
    <!-- Main frame / body: sweeping from rear hub up to seat, then across to head -->
    <path d="M18 44 L24 28 Q27 22 32 22 L44 22" stroke-width="3"/>
    <!-- Down tube: from head down to engine area -->
    <path d="M44 22 L46 36 Q46 42 42 44" stroke-width="2.5"/>
    <!-- Seat -->
    <path d="M28 25 L38 25" stroke-width="4.5"/>
    <!-- Tail/rear fender sweep -->
    <path d="M18 44 Q14 36 16 30" stroke-width="2"/>
    <!-- Handlebars -->
    <path d="M42 22 L43 16 Q44 14 48 15" stroke-width="2.5"/>
    <!-- Exhaust / engine detail -->
    <path d="M38 42 Q36 46 32 47 Q28 48 24 46" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Lightning bolt accent -->
  <g transform="translate(36, 8) scale(0.5)">
    <polygon points="20,0 8,24 16,24 6,44 28,18 18,18 26,0" fill="#FFD700" opacity="0.8"/>
  </g>
</svg>
